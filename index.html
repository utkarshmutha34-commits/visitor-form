<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Visitor Form</title>

  <!-- Google Fonts & Font Awesome Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
      padding: 20px;
      margin: 0;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      animation: float 8s infinite alternate ease-in-out;
    }
    .blob-1 {
      width: 400px;
      height: 400px;
      background: #818cf8;
      top: -100px;
      right: -100px;
    }
    .blob-2 {
      width: 350px;
      height: 350px;
      background: #c084fc;
      bottom: -80px;
      left: -80px;
      animation-delay: -4s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 520px;
    }

    .form-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 32px;
      padding: 40px 35px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      transition: all 0.3s ease;
    }

    .form-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .form-header .icon-circle {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: white;
      font-size: 28px;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
    }
    .form-header h2 {
      font-size: 26px;
      font-weight: 700;
      color: #1e1b4b;
      letter-spacing: -0.5px;
    }
    .form-header p {
      color: #6b7280;
      font-size: 15px;
      margin-top: 4px;
    }

    /* Input Groups */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 18px;
      transition: color 0.2s;
      pointer-events: none;
    }
    .input-group textarea ~ i {
      top: 22px;
      transform: none;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 16px 16px 16px 48px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      outline: none;
      transition: all 0.25s ease;
      color: #1f2937;
    }

    .input-group textarea {
      padding-top: 16px;
      resize: vertical;
      min-height: 100px;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #4f46e5;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
    .input-group input:focus ~ i,
    .input-group textarea:focus ~ i {
      color: #4f46e5;
    }

    /* Validation States */
    .input-group.success input,
    .input-group.success textarea {
      border-color: #10b981;
      background: #f0fdf4;
    }
    .input-group.success i {
      color: #10b981;
    }

    .input-group.error input,
    .input-group.error textarea {
      border-color: #ef4444;
      background: #fef2f2;
    }
    .input-group.error i {
      color: #ef4444;
    }

    .error-msg {
      font-size: 12px;
      color: #ef4444;
      font-weight: 500;
      margin-top: 6px;
      padding-left: 12px;
      display: none;
    }
    .input-group.error .error-msg {
      display: block;
    }

    /* Submit Button */
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 17px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
      box-shadow: 0 8px 24px rgba(79, 70, 229, 0.3);
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(79, 70, 229, 0.4);
    }
    .btn-submit:active:not(:disabled) {
      transform: scale(0.98);
    }
    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-submit.loading .spinner {
      display: inline-block;
    }
    .btn-submit.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success Screen */
    #successScreen {
      display: none;
      text-align: center;
      padding: 30px 10px;
      animation: fadeUp 0.6s ease;
    }
    #successScreen .checkmark {
      width: 80px;
      height: 80px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      color: white;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    }
    #successScreen h3 {
      font-size: 24px;
      color: #1e1b4b;
      margin-bottom: 6px;
    }
    #successScreen p {
      color: #6b7280;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1f2937;
      color: white;
      padding: 14px 28px;
      border-radius: 16px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 5px solid #4f46e5;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast.error {
      border-left-color: #ef4444;
    }
    .toast.success {
      border-left-color: #10b981;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .form-card { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <!-- Background Blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <i class="fas fa-info-circle"></i>
    <span id="toastMessage">Success!</span>
  </div>

  <div class="container">
    <div class="form-card">

      <!-- FORM VIEW -->
      <div id="formView">
        <div class="form-header">
          <div class="icon-circle"><i class="fas fa-user-plus"></i></div>
          <h2>Get in Touch</h2>
          <p>Fill in your details and we'll reach out shortly.</p>
        </div>

        <form id="infoForm" novalidate>
          <!-- Name -->
          <div class="input-group" id="nameGroup">
            <i class="fas fa-user"></i>
            <input type="text" id="name" placeholder="Full Name" required />
            <div class="error-msg">Please enter your full name.</div>
          </div>

          <!-- Email -->
          <div class="input-group" id="emailGroup">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Email Address" required />
            <div class="error-msg">Please enter a valid email.</div>
          </div>

          <!-- Phone -->
          <div class="input-group" id="phoneGroup">
            <i class="fas fa-phone-alt"></i>
            <input type="tel" id="phone" placeholder="Phone Number" required />
            <div class="error-msg">Enter a valid 10-digit phone number.</div>
          </div>

          <!-- Message -->
          <div class="input-group" id="messageGroup">
            <i class="fas fa-comment"></i>
            <textarea id="message" placeholder="Your Message (Optional)"></textarea>
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">
            <span class="btn-text"><i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Submit Now</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>

      <!-- SUCCESS VIEW (Hidden by default) -->
      <div id="successScreen">
        <div class="checkmark"><i class="fas fa-check"></i></div>
        <h3>Thank You! 🎉</h3>
        <p>Your information has been saved successfully. We'll get back to you soon.</p>
        <button onclick="resetForm()" style="margin-top: 25px; background: #e5e7eb; border: none; padding: 12px 30px; border-radius: 40px; font-weight: 600; color: #1f2937; cursor: pointer;">
          <i class="fas fa-arrow-left"></i> Submit Another Response
        </button>
      </div>

    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // =====================================================
    //  🔑  REPLACE WITH YOUR SUPABASE CREDENTIALS
    // =====================================================
    const SUPABASE_URL = 'https://pycggnzplbnpvzccIpzv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hpzOtKkF-VT71s75TwkK8w_VKpHkNyg';
    // =====================================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM Elements
    const form = document.getElementById('infoForm');
    const submitBtn = document.getElementById('submitBtn');
    const formView = document.getElementById('formView');
    const successView = document.getElementById('successScreen');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');

    // Input groups
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const phoneInput = document.getElementById('phone');
    const messageInput = document.getElementById('message');

    const nameGroup = document.getElementById('nameGroup');
    const emailGroup = document.getElementById('emailGroup');
    const phoneGroup = document.getElementById('phoneGroup');

    // --- Helper: Show Toast ---
    function showToast(msg, type = 'success') {
      toast.className = `toast ${type}`;
      toastMessage.textContent = msg;
      // Change icon
      const icon = toast.querySelector('i');
      if (type === 'error') {
        icon.className = 'fas fa-exclamation-circle';
      } else {
        icon.className = 'fas fa-check-circle';
      }
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // --- Real-time Validation ---
    function validateField(group, input, type = 'text') {
      const val = input.value.trim();
      let isValid = false;

      if (type === 'email') {
        isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
      } else if (type === 'phone') {
        isValid = /^[0-9]{10}$/.test(val.replace(/\s/g, ''));
      } else {
        isValid = val.length > 0;
      }

      if (val.length === 0) {
        group.classList.remove('success', 'error');
        return false;
      }

      if (isValid) {
        group.classList.remove('error');
        group.classList.add('success');
      } else {
        group.classList.remove('success');
        group.classList.add('error');
      }
      return isValid;
    }

    nameInput.addEventListener('blur', () => validateField(nameGroup, nameInput, 'text'));
    emailInput.addEventListener('blur', () => validateField(emailGroup, emailInput, 'email'));
    phoneInput.addEventListener('blur', () => validateField(phoneGroup, phoneInput, 'phone'));

    // Live feedback (optional)
    nameInput.addEventListener('input', () => validateField(nameGroup, nameInput, 'text'));
    emailInput.addEventListener('input', () => validateField(emailGroup, emailInput, 'email'));
    phoneInput.addEventListener('input', () => validateField(phoneGroup, phoneInput, 'phone'));

    // --- Form Submit ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Final validation check
      const isNameValid = validateField(nameGroup, nameInput, 'text');
      const isEmailValid = validateField(emailGroup, emailInput, 'email');
      const isPhoneValid = validateField(phoneGroup, phoneInput, 'phone');

      if (!isNameValid || !isEmailValid || !isPhoneValid) {
        showToast('Please fix the highlighted fields before submitting.', 'error');
        // Focus first invalid field
        if (!isNameValid) nameInput.focus();
        else if (!isEmailValid) emailInput.focus();
        else if (!isPhoneValid) phoneInput.focus();
        return;
      }

      // Prepare data
      const payload = {
        name: nameInput.value.trim(),
        email: emailInput.value.trim(),
        phone: phoneInput.value.trim(),
        message: messageInput.value.trim() || null,
      };

      // UI Loading State
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');

      try {
        const { data, error } = await supabase
          .from('visitors') // Make sure this table exists!
          .insert([payload]);

        if (error) throw error;

        // Success!
        formView.style.display = 'none';
        successView.style.display = 'block';
        showToast('Information saved successfully!', 'success');

      } catch (err) {
        console.error('Supabase Error:', err);
        showToast('Something went wrong. Please try again later.', 'error');
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    });

    // --- Reset Function (to go back) ---
    window.resetForm = function() {
      formView.style.display = 'block';
      successView.style.display = 'none';
      form.reset();
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
      // Clear validation styles
      document.querySelectorAll('.input-group').forEach(g => {
        g.classList.remove('success', 'error');
      });
      // Scroll to top of card
      document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
    };

    // --- Check Supabase connection on load (optional) ---
    console.log('🚀 Form ready. Waiting for submission.');
  </script>

</body>
</html>
